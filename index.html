<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOOM WEB</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Marco del juego */
.wrapper{
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* Escalado REAL */
iframe{
    width:1280px;
    height:960px;

    border:none;

    transform:scale(1.5);

    transform-origin:center center;
}

</style>
</head>

<body>

<div class="wrapper">

<iframe
src="https://archive.org/embed/doom_dos"
allowfullscreen>
</iframe>

</div>

</body>
</html>
