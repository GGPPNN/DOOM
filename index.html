<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOOM WEB</title>

<style>

html, body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Contenedor proporcional 4:3 */
.game-container{
    width:90vw;
    height:90vh;

    max-width:1200px;
    aspect-ratio:4/3;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Iframe */
iframe{
    width:100%;
    height:100%;
    border:none;

    image-rendering: pixelated;
}

</style>
</head>

<body>

<div class="game-container">

<iframe
src="https://archive.org/embed/doom_dos"
allowfullscreen
webkitallowfullscreen
mozallowfullscreen>
</iframe>

</div>

</body>
</html>
