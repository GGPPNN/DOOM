<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOOM WEB</title>

<style>

html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

/* Pantalla completa */
.container{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* Emulador */
iframe{

    width:800px;
    height:600px;

    border:none;

    /* CENTRADO REAL */
    transform:scale(1.8);

    transform-origin:center center;

    display:block;
}

</style>
</head>

<body>

<div class="container">

<iframe
src="https://archive.org/embed/doom_dos"
allowfullscreen>
</iframe>

</div>

</body>
</html>
