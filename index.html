<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOOM WEB</title>

<style>

html,body{
    margin:0;
    width:80%;
    height:80%;
    overflow:hidden;
    background:black;
}

/* Pantalla completa */
.container{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:black;
    overflow:hidden;
}

/* Marco proporcional */
.game{
    width:95vw;
    height:95vh;

    max-width:1400px;

    aspect-ratio:4/3;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* Emulador */
iframe{

    width:80%;
    height:80%;

    border:none;

    transform:scale(1.15);

    transform-origin:center center;

    image-rendering:pixelated;
}

</style>
</head>

<body>

<div class="container">

<div class="game">

<iframe
src="https://archive.org/embed/doom_dos"
allowfullscreen>
</iframe>

</div>

</div>

</body>
</html>
